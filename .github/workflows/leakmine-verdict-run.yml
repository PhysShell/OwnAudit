# ONE-SHOT verdict run (throwaway, branch-scoped) — android_kotlin this time. Demonstrates
# the full firehose->verdict loop WITH language enrichment:
#
#   ClickHouse playground (zero-auth) -> NDJSON  (discovery, cross-language: CH has no lang col)
#     -> bq-ingest        (metadata tier: keyword + PR-size score)
#     -> enrich-store      (batched GraphQL primaryLanguage; mark non-Kotlin/Java wrong-language)
#     -> classify-store    (verdict: fetch diff + real patch classifier — SKIPS wrong-language)
#
# enrich.md reports how many candidates are marked wrong-language and thus skipped BEFORE the
# diff fetch — the cross-language trim, live. Runner's GITHUB_TOKEN does the fetches + GraphQL.
# Triggered by push to this dev branch only; delete the file when the run is captured.
name: leakmine — verdict run (one-shot)

on:
  push:
    branches: [claude/own-language-market-research-jgrrgm]
    paths: [.github/workflows/leakmine-verdict-run.yml]

permissions:
  contents: read        # GITHUB_TOKEN reads/searches public PRs + GraphQL primaryLanguage

concurrency:
  group: leakmine-verdict-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verdict:
    name: android_kotlin firehose -> enrich -> verdict
    runs-on: ubuntu-latest
    env:
      ECOSYSTEM: android_kotlin
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # 1) DISCOVERY — ClickHouse public playground (user=play, no password). github_events has
      # no repo-language column, so this pulls leak-keyword'd merged PRs across ALL languages;
      # enrichment (step 3) trims the cross-language tail. Title-only match keeps the scan inside
      # the playground's memory budget; size-capped + small-first to bias toward focused fixes.
      - name: Discover candidates (ClickHouse playground -> NDJSON)
        run: |
          set -euo pipefail
          cat > q.sql <<'SQL'
          SELECT
            repo_name AS repo,
            number,
            title,
            body,
            changed_files,
            concat('https://github.com/', repo_name, '/pull/', toString(number)) AS html_url
          FROM github_events
          WHERE event_type = 'PullRequestEvent'
            AND action = 'closed'
            AND merged = 1
            AND created_at >= '2024-01-01' AND created_at < '2025-01-01'
            AND changed_files BETWEEN 1 AND 80
            AND multiSearchAnyCaseInsensitive(title,
                  ['memory leak','leaks','retain','not disposed','not released',
                   'never released','grows unbounded','out of memory'])
          ORDER BY changed_files ASC
          LIMIT 1500
          FORMAT JSONEachRow
          SQL
          curl -sS --fail-with-body 'https://play.clickhouse.com/?user=play' \
            --data-binary @q.sql > rows.ndjson
          echo "discovered $(wc -l < rows.ndjson) raw rows"

      # 2) INGEST — metadata tier (keyword + PR-size), cross-run dedup against the store.
      # Per-stage --out-dir (so each summary.md is distinct); ONE shared --store.
      - name: Ingest (metadata tier)
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m leakmine.cli bq-ingest \
            --rows rows.ndjson --ecosystem "$ECOSYSTEM" \
            --min-meta-score 4 --out-dir bq-out/ingest --store bq-out/corpus.db

      # 3) ENRICH — batched GraphQL primaryLanguage; mark non-Kotlin/Java candidates
      # wrong-language so classify-store skips them BEFORE fetching a diff. The reduction step.
      - name: Enrich language (batched GraphQL) — trims the cross-language tail
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m leakmine.cli enrich-store \
            --store bq-out/corpus.db --ecosystem "$ECOSYSTEM" \
            --batch 100 --out-dir bq-out/enrich

      # 4) VERDICT — fetch diffs for the survivors only + real patch classifier.
      - name: Classify from store (verdict; wrong-language already skipped)
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m leakmine.cli classify-store \
            --store bq-out/corpus.db --ecosystem "$ECOSYSTEM" \
            --min-score 7 --sleep 1 --out-dir bq-out/verdict

      - name: Publish summaries to the run
        if: always()
        run: |
          {
            echo "## Ingest (metadata tier)"; cat bq-out/ingest/summary.md 2>/dev/null || true
            echo; echo "## Enrichment (cross-language trim BEFORE diff fetch)"
            cat bq-out/enrich/enrich.md 2>/dev/null || true
            echo; echo "## Verdict (classify-store)"; cat bq-out/verdict/summary.md 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload corpus + outputs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: leakmine-verdict-android_kotlin
          path: bq-out/
          if-no-files-found: warn
